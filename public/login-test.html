<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: blue; color: white; border: none; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Login Test</h1>
    <div id="status"></div>
    <input type="email" id="email" placeholder="Email" value="test@example.com">
    <input type="password" id="password" placeholder="Password" value="123456">
    <input type="text" id="otp" placeholder="OTP (any 6 digits)">
    <button onclick="testLogin()">Login</button>
    <pre id="result"></pre>

    <script>
    const API_URL = 'https://buildmatrix-clean.onrender.com';
    
    async function testLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const otp = document.getElementById('otp').value;
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        
        statusDiv.innerHTML = '<div>Testing connection...</div>';
        
        // Test if backend is reachable
        try {
            const testResponse = await fetch(`${API_URL}/api/test-login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: email, password: password })
            });
            const testData = await testResponse.json();
            resultDiv.innerHTML = JSON.stringify(testData, null, 2);
            statusDiv.innerHTML = '<div class="success">✓ Backend reachable!</div>';
        } catch (error) {
            statusDiv.innerHTML = `<div class="error">✗ Backend error: ${error.message}</div>`;
            resultDiv.innerHTML = error.message;
        }
    }
    
    // Test OTP endpoint
    async function testOTP() {
        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        
        try {
            const response = await fetch(`${API_URL}/api/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: otp })
            });
            const data = await response.json();
            alert('OTP Response: ' + JSON.stringify(data));
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }
    </script>
</body>
</html>
