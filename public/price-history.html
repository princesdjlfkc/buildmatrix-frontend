<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildMatrix - Price History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root { --gold:#00D4FF;--gold-dark:#0099CC;--gold-dim:rgba(0,212,255,0.12);--gold-border:rgba(0,212,255,0.28);--bg-dark:#080C14;--bg-card:#0e1520;--bg-surface:#111a28;--text-primary:#D8EEFF;--text-secondary:#5a8aaa;--text-muted:#2a4560;--border:#1a2840; }
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:var(--bg-dark);color:var(--text-primary);font-family:'Inter',sans-serif;min-height:100vh; }
    .page-header { background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(123,63,228,0.08));border-bottom:1px solid var(--border);padding:32px 0; }
    .container { max-width:900px;margin:0 auto;padding:0 24px; }
    .back-btn { display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit;margin-bottom:16px; }
    .back-btn:hover { color:var(--gold); }
    .page-title { font-size:28px;font-weight:900;display:flex;align-items:center;gap:12px; }
    .page-title i { color:var(--gold); }
    .page-sub { font-size:13px;color:var(--text-muted);margin-top:6px; }
    .chart-card { background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-top:28px; }
    .chart-title { font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:20px;display:flex;align-items:center;gap:8px; }
    .chart-title i { color:var(--gold); }
    .chart-wrap { position:relative;height:300px; }
    .builds-table { margin-top:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:40px; }
    .table-header { display:grid;grid-template-columns:1fr auto auto;gap:16px;padding:12px 20px;background:var(--bg-surface);font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em; }
    .table-row { display:grid;grid-template-columns:1fr auto auto;gap:16px;padding:14px 20px;border-top:1px solid var(--border);align-items:center;transition:background 0.2s; }
    .table-row:hover { background:var(--bg-surface); }
    .build-name { font-size:13px;font-weight:600;color:var(--text-primary); }
    .build-date { font-size:12px;color:var(--text-muted); }
    .build-price { font-size:14px;font-weight:800;color:var(--gold); }
    .empty { text-align:center;padding:60px;color:var(--text-muted); }
    .loading { text-align:center;padding:60px;color:var(--text-muted); }
    .summary-row { display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px;margin-bottom:0; }
    .summary-card { background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center; }
    .summary-num { font-size:22px;font-weight:900;color:var(--gold); }
    .summary-label { font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px; }
  </style>
</head>
<body>
<div class="page-header">
  <div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back to Builder</button>
    <div class="page-title"><i class="fas fa-chart-line"></i> Price History</div>
    <div class="page-sub">Track your PC build costs over time</div>
  </div>
</div>
<div class="container">
  <div id="mainContent"><div class="loading" style="margin-top:40px;"><i class="fas fa-spinner fa-spin fa-2x"></i><div style="margin-top:12px;">Loading your build history...</div></div></div>
</div>
<script src="common.js"></script>
<script>
  function formatMoney(n) { return '₱' + (Number(n)||0).toLocaleString(); }
  function formatDate(iso) {
    try { return new Date(iso).toLocaleDateString('en-PH',{month:'short',day:'2-digit',year:'numeric'}); }
    catch { return '—'; }
  }

  async function loadHistory() {
    const user = getCurrentUser();
    if (!user) { window.location.href = 'auth.html'; return; }
    try {
      const data = await apiFetch('/builds/history/all');
      renderHistory(data.builds || []);
    } catch(e) {
      document.getElementById('mainContent').innerHTML = '<div class="empty">Failed to load build history.</div>';
    }
  }

  function renderHistory(builds) {
    const el = document.getElementById('mainContent');
    if (!builds.length) {
      el.innerHTML = '<div class="empty" style="margin-top:40px;"><i class="fas fa-chart-line" style="font-size:40px;margin-bottom:12px;display:block;"></i>No builds yet. Start building to see your price history!</div>';
      return;
    }

    const sorted = [...builds].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    const prices = sorted.map(b => Number(b.total)||0);
    const labels = sorted.map(b => formatDate(b.created_at));
    const maxPrice = Math.max(...prices);
    const minPrice = Math.min(...prices);
    const avgPrice = Math.round(prices.reduce((s,p)=>s+p,0)/prices.length);

    el.innerHTML = `
      <div class="summary-row">
        <div class="summary-card"><div class="summary-num">${builds.length}</div><div class="summary-label">Total Builds</div></div>
        <div class="summary-card"><div class="summary-num">${formatMoney(maxPrice)}</div><div class="summary-label">Most Expensive</div></div>
        <div class="summary-card"><div class="summary-num">${formatMoney(avgPrice)}</div><div class="summary-label">Average Cost</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-chart-line"></i> Build Cost Over Time</div>
        <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
      </div>
      <div class="builds-table">
        <div class="table-header"><span>Build Name</span><span>Date</span><span>Cost</span></div>
        ${sorted.map(b=>`
          <div class="table-row" onclick="window.location.href='index.html?buildId=${b.id}'" style="cursor:pointer;">
            <div class="build-name">${b.name}</div>
            <div class="build-date">${formatDate(b.created_at)}</div>
            <div class="build-price">${formatMoney(b.total)}</div>
          </div>
        `).join('')}
      </div>
    `;

    const ctx = document.getElementById('priceChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Build Cost',
          data: prices,
          borderColor: '#00D4FF',
          backgroundColor: 'rgba(0,212,255,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#00D4FF',
          pointRadius: 5,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => '₱' + ctx.parsed.y.toLocaleString()
            }
          }
        },
        scales: {
          x: { ticks: { color: '#5a8aaa', font: { size: 11 } }, grid: { color: 'rgba(26,40,64,0.8)' } },
          y: { ticks: { color: '#5a8aaa', font: { size: 11 }, callback: v => '₱' + v.toLocaleString() }, grid: { color: 'rgba(26,40,64,0.8)' } }
        }
      }
    });
  }

  loadHistory();
</script>
</body>
</html>
