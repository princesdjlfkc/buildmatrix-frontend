<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildMatrix - Compare Builds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --gold:#00D4FF;--bg:#080C14;--bg2:#0e1520;--bg3:#111a28;--text:#D8EEFF;--text2:#5a8aaa;--text3:#2a4560;--border:#1a2840; }
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh; }
    .header { background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(123,63,228,0.08));border-bottom:1px solid var(--border);padding:24px; }
    .header-inner { max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:16px; }
    .back-btn { background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px; }
    .back-btn:hover { color:var(--gold); }
    .page-title { font-size:24px;font-weight:900;display:flex;align-items:center;gap:10px; }
    .page-title i { color:var(--gold); }
    .container { max-width:1100px;margin:0 auto;padding:24px; }
    .select-row { display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px; }
    .select-card { background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px; }
    .select-label { font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px; }
    select { width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;cursor:pointer; }
    select:focus { outline:none;border-color:var(--gold); }
    .compare-btn { width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:8px; }
    .compare-btn:hover { background:#00b8e0; }
    .compare-grid { display:grid;grid-template-columns:200px 1fr 1fr;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:40px; }
    .col-label { background:var(--bg3);padding:0; }
    .col-a { background:rgba(0,212,255,0.04);border-left:1px solid var(--border); }
    .col-b { background:rgba(123,63,228,0.04);border-left:1px solid var(--border); }
    .col-header { padding:18px 20px;font-weight:800;font-size:15px;border-bottom:2px solid var(--border); }
    .col-a .col-header { color:#00D4FF; }
    .col-b .col-header { color:#7b3fe4; }
    .col-label .col-header { color:var(--text3);font-size:12px;text-transform:uppercase;letter-spacing:0.08em; }
    .row { display:contents; }
    .cell { padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center; }
    .cell-label { font-weight:600;color:var(--text2);font-size:12px; }
    .cell-val { color:var(--text); }
    .cell-val.winner { color:#22C55E;font-weight:700; }
    .cell-val.loser { color:var(--text3); }
    .cell-val.price { font-size:16px;font-weight:900;color:var(--gold); }
    .cell-val.price.loser { color:var(--text3);font-size:14px;font-weight:600; }
    .diff-badge { font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px; }
    .diff-better { background:rgba(34,197,94,0.15);color:#22C55E;border:1px solid rgba(34,197,94,0.3); }
    .diff-worse { background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2); }
    .empty { text-align:center;padding:60px;color:var(--text3); }
    .loading { text-align:center;padding:40px;color:var(--text2); }
    .parts-section { margin-top:28px; }
    .parts-title { font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px; }
    .parts-title i { color:var(--gold); }
    .parts-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    .parts-card { background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px; }
    .parts-card h4 { font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border); }
    .parts-card h4.a { color:#00D4FF; }
    .parts-card h4.b { color:#7b3fe4; }
    .part-row { display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(26,40,64,0.5);font-size:12px; }
    .part-row:last-child { border:none; }
    .part-name { color:var(--text);flex:1;padding-right:10px; }
    .part-cat { color:var(--text3);font-size:10px;text-transform:uppercase; }
    .part-price { color:var(--gold);font-weight:700;flex-shrink:0; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <button class="back-btn" onclick="window.location.href='my-builds.html'"><i class="fas fa-arrow-left"></i> My Builds</button>
    <div class="page-title"><i class="fas fa-balance-scale"></i> Compare Builds</div>
  </div>
</div>
<div class="container">
  <div class="select-row">
    <div class="select-card">
      <div class="select-label"><i class="fas fa-circle" style="color:#00D4FF;margin-right:6px;"></i>Build A</div>
      <select id="selectA"><option value="">— Select a build —</option></select>
    </div>
    <div class="select-card">
      <div class="select-label"><i class="fas fa-circle" style="color:#7b3fe4;margin-right:6px;"></i>Build B</div>
      <select id="selectB"><option value="">— Select a build —</option></select>
    </div>
  </div>
  <button class="compare-btn" onclick="doCompare()"><i class="fas fa-balance-scale"></i> Compare Now</button>
  <div id="result"></div>
</div>
<script src="common.js"></script>
<script>
  let allBuilds = [];

  function fmt(n) { return '₱' + (Number(n)||0).toLocaleString(); }
  function fmtDate(iso) {
    try { return new Date(iso).toLocaleDateString('en-PH',{month:'short',day:'2-digit',year:'numeric'}); }
    catch { return '—'; }
  }

  async function loadBuilds() {
    const user = getCurrentUser();
    if (!user) { window.location.href = 'auth.html'; return; }
    try {
      const data = await apiFetch('/builds');
      allBuilds = data.builds || [];
      populateSelects();
    } catch(e) {
      showToast('Failed to load builds', true);
    }
  }

  function populateSelects() {
    const opts = allBuilds.map(b => `<option value="${b.id}">${b.name} — ${fmt(b.total)}</option>`).join('');
    document.getElementById('selectA').innerHTML = '<option value="">— Select a build —</option>' + opts;
    document.getElementById('selectB').innerHTML = '<option value="">— Select a build —</option>' + opts;
    const params = new URLSearchParams(window.location.search);
    if (params.get('a')) document.getElementById('selectA').value = params.get('a');
    if (params.get('b')) document.getElementById('selectB').value = params.get('b');
    if (params.get('a') && params.get('b')) doCompare();
  }

  async function doCompare() {
    const a = document.getElementById('selectA').value;
    const b = document.getElementById('selectB').value;
    if (!a || !b) { showToast('Please select two builds', true); return; }
    if (a === b) { showToast('Please select two different builds', true); return; }
    document.getElementById('result').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

    const buildA = allBuilds.find(x => x.id === a);
    const buildB = allBuilds.find(x => x.id === b);
    if (!buildA || !buildB) { showToast('Build not found', true); return; }

    const itemsA = buildA.items || [];
    const itemsB = buildB.items || [];
    const totalA = Number(buildA.total) || 0;
    const totalB = Number(buildB.total) || 0;
    const partsA = itemsA.length;
    const partsB = itemsB.length;
    const aWinsPrice = totalA <= totalB;
    const aWinsParts = partsA >= partsB;

    const cats = ['cpu','gpu','motherboard','ram','ssd','hdd','psu','case','monitor','keyboard','mouse','fan'];
    const catRows = cats.map(cat => {
      const pA = itemsA.find(i => i.category === cat);
      const pB = itemsB.find(i => i.category === cat);
      if (!pA && !pB) return '';
      const nameA = pA ? pA.name : '—';
      const nameB = pB ? pB.name : '—';
      const clsA = pA && !pB ? 'winner' : (!pA && pB ? 'loser' : 'cell-val');
      const clsB = !pA && pB ? 'winner' : (pA && !pB ? 'loser' : 'cell-val');
      return `
        <div class="cell cell-label">${cat.toUpperCase()}</div>
        <div class="cell"><span class="${clsA}">${nameA}</span></div>
        <div class="cell"><span class="${clsB}">${nameB}</span></div>`;
    }).join('');

    document.getElementById('result').innerHTML = `
      <div class="compare-grid">
        <div class="col-label"><div class="col-header">Category</div></div>
        <div class="col-a"><div class="col-header"><i class="fas fa-circle" style="font-size:9px;margin-right:6px;"></i>${buildA.name}</div></div>
        <div class="col-b"><div class="col-header"><i class="fas fa-circle" style="font-size:9px;margin-right:6px;color:#7b3fe4;"></i>${buildB.name}</div></div>

        <div class="cell cell-label">Total Cost</div>
        <div class="cell"><span class="cell-val price ${aWinsPrice?'winner':'loser'}">${fmt(totalA)}${aWinsPrice?'<span class="diff-badge diff-better">CHEAPER</span>':''}</span></div>
        <div class="cell"><span class="cell-val price ${!aWinsPrice?'winner':'loser'}">${fmt(totalB)}${!aWinsPrice?'<span class="diff-badge diff-better">CHEAPER</span>':''}</span></div>

        <div class="cell cell-label">Parts Count</div>
        <div class="cell"><span class="cell-val ${aWinsParts?'winner':'loser'}">${partsA} parts${aWinsParts&&partsA>partsB?'<span class="diff-badge diff-better">MORE</span>':''}</span></div>
        <div class="cell"><span class="cell-val ${!aWinsParts?'winner':'loser'}">${partsB} parts${!aWinsParts&&partsB>partsA?'<span class="diff-badge diff-better">MORE</span>':''}</span></div>

        <div class="cell cell-label">Date Created</div>
        <div class="cell"><span class="cell-val">${fmtDate(buildA.createdAt)}</span></div>
        <div class="cell"><span class="cell-val">${fmtDate(buildB.createdAt)}</span></div>

        ${catRows}
      </div>

      <div class="parts-section">
        <div class="parts-title"><i class="fas fa-list"></i> Full Parts List</div>
        <div class="parts-grid">
          <div class="parts-card">
            <h4 class="a"><i class="fas fa-circle" style="font-size:9px;margin-right:6px;"></i>${buildA.name}</h4>
            ${itemsA.map(i=>`<div class="part-row"><div><div class="part-name">${i.name}</div><div class="part-cat">${i.category||''}</div></div><div class="part-price">${fmt(i.price)}</div></div>`).join('') || '<div style="color:var(--text3);font-size:13px;">No parts</div>'}
          </div>
          <div class="parts-card">
            <h4 class="b"><i class="fas fa-circle" style="font-size:9px;margin-right:6px;color:#7b3fe4;"></i>${buildB.name}</h4>
            ${itemsB.map(i=>`<div class="part-row"><div><div class="part-name">${i.name}</div><div class="part-cat">${i.category||''}</div></div><div class="part-price">${fmt(i.price)}</div></div>`).join('') || '<div style="color:var(--text3);font-size:13px;">No parts</div>'}
          </div>
        </div>
      </div>
    `;
  }

  loadBuilds();
</script>
</body>
</html>
