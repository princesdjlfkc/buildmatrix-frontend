<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Build Database — GPU, CPU & SSD Specs</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Exo+2:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--bg2:#0c0f18;--bg3:#111520;--bg4:#161c28;
  --border:#1a2235;--border2:#243045;
  --nvidia:#76b900;--amd:#ed1c24;--intel:#0071c5;
  --accent:#e8c84a;--accent2:#ff6b35;
  --text:#b8cce0;--text2:#7a9ab8;--text3:#3d5570;
  --white:#f0f6ff;
  --gpu:#a78bfa;--cpu:#fb923c;--ssd:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}

/* GRID BG */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,34,53,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(26,34,53,0.4) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.hdr{max-width:1800px;margin:0 auto;padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:1.5rem;}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:3px;text-transform:uppercase;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo-icon{width:28px;height:28px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;color:#000;}
.logo em{color:var(--accent);font-style:normal;}
nav{display:flex;gap:2px;margin-left:auto;}
nav a{color:var(--text2);text-decoration:none;font-size:0.78rem;font-weight:600;padding:0.35rem 0.8rem;border-radius:4px;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;}
nav a:hover{color:var(--white);background:rgba(255,255,255,0.06);}
nav a.active{color:var(--accent);background:rgba(232,200,74,0.08);}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.2rem 1.5rem;position:relative;z-index:10;}
.topbar-inner{max-width:1800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;}
.db-title{display:flex;flex-direction:column;}
.db-title h1{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:2px;color:var(--white);line-height:1;}
.db-title span{font-size:0.78rem;color:var(--text2);letter-spacing:0.5px;margin-top:2px;}
.db-counts{display:flex;gap:2rem;}
.db-count{display:flex;flex-direction:column;align-items:center;}
.db-count-num{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;line-height:1;}
.db-count-num.g{color:var(--gpu);}
.db-count-num.c{color:var(--cpu);}
.db-count-num.s{color:var(--ssd);}
.db-count-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}

/* CONTROLS */
.ctrl-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;position:sticky;top:56px;z-index:150;}
.ctrl-inner{max-width:1800px;margin:0 auto;display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}

/* Category tabs */
.cat-tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.cat-tab{background:transparent;border:none;color:var(--text2);padding:0.45rem 1rem;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;border-right:1px solid var(--border);transition:all 0.15s;white-space:nowrap;}
.cat-tab:last-child{border-right:none;}
.cat-tab:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.cat-tab.active.gpu{color:var(--gpu);background:rgba(167,139,250,0.1);}
.cat-tab.active.cpu{color:var(--cpu);background:rgba(251,146,60,0.1);}
.cat-tab.active.ssd{color:var(--ssd);background:rgba(52,211,153,0.1);}
.cat-tab.active.all{color:var(--accent);background:rgba(232,200,74,0.08);}

/* Brand filter buttons */
.brand-tabs{display:flex;gap:4px;}
.brand-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.4rem 0.9rem;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;border-radius:5px;transition:all 0.15s;white-space:nowrap;}
.brand-btn:hover{border-color:var(--border2);color:var(--white);}
.brand-btn.active.nvidia{color:var(--nvidia);background:rgba(118,185,0,0.1);border-color:rgba(118,185,0,0.3);}
.brand-btn.active.amd{color:var(--amd);background:rgba(237,28,36,0.1);border-color:rgba(237,28,36,0.3);}
.brand-btn.active.intel{color:var(--intel);background:rgba(0,113,197,0.1);border-color:rgba(0,113,197,0.3);}
.brand-btn.active.all{color:var(--accent);background:rgba(232,200,74,0.08);border-color:rgba(232,200,74,0.2);}

/* Search & selects */
.search-wrap{flex:1;min-width:180px;max-width:320px;position:relative;}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--white);padding:0.45rem 0.75rem 0.45rem 2rem;border-radius:5px;font-family:'Exo 2',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:0.65rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.8rem;pointer-events:none;}
.ctrl-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.45rem 0.7rem;border-radius:5px;font-family:'Exo 2',sans-serif;font-size:0.8rem;outline:none;cursor:pointer;transition:border-color 0.15s;}
.ctrl-select:focus{border-color:var(--accent);}
.res-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text3);white-space:nowrap;}

/* TABLE */
.tbl-wrap{max-width:1800px;margin:0 auto;padding:1.5rem;position:relative;z-index:5;}
.specs-tbl{width:100%;border-collapse:collapse;font-size:0.8rem;}
.specs-tbl thead{position:sticky;top:108px;z-index:10;}
.specs-tbl thead tr{background:var(--bg4);}
.specs-tbl th{padding:0.6rem 0.7rem;text-align:left;font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;font-size:0.7rem;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border2);user-select:none;transition:color 0.15s;}
.specs-tbl th:hover{color:var(--text);}
.specs-tbl th.sorted-asc,.specs-tbl th.sorted-desc{color:var(--accent);}
.specs-tbl th .arr{margin-left:3px;font-size:0.65rem;}
.specs-tbl tbody tr{border-bottom:1px solid rgba(26,34,53,0.8);transition:background 0.1s;cursor:pointer;}
.specs-tbl tbody tr:hover{background:rgba(255,255,255,0.03);}
.specs-tbl td{padding:0.5rem 0.7rem;vertical-align:middle;}
.chip-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.92rem;color:var(--white);letter-spacing:0.3px;}
.chip-name:hover{color:var(--accent);}
.mono{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text2);}
.mono.hi{color:var(--white);}
.brand-nvidia{color:var(--nvidia);font-weight:700;font-size:0.75rem;}
.brand-amd{color:var(--amd);font-weight:700;font-size:0.75rem;}
.brand-intel{color:var(--intel);font-weight:700;font-size:0.75rem;}
.brand-samsung{color:#60a5fa;font-weight:700;font-size:0.75rem;}
.brand-wd,.brand-western-digital{color:#38bdf8;font-weight:700;font-size:0.75rem;}
.brand-seagate{color:#a78bfa;font-weight:700;font-size:0.75rem;}
.brand-crucial,.brand-micron{color:#4ade80;font-weight:700;font-size:0.75rem;}
.brand-kingston{color:#f87171;font-weight:700;font-size:0.75rem;}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:0.65rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.badge-gpu{background:rgba(167,139,250,0.15);color:var(--gpu);border:1px solid rgba(167,139,250,0.25);}
.badge-cpu{background:rgba(251,146,60,0.15);color:var(--cpu);border:1px solid rgba(251,146,60,0.25);}
.badge-ssd{background:rgba(52,211,153,0.15);color:var(--ssd);border:1px solid rgba(52,211,153,0.25);}
.perf-cell{display:flex;align-items:center;gap:5px;}
.pbar{height:3px;width:60px;background:var(--border);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;}
.pbar-fill.gpu{background:var(--gpu);}
.pbar-fill.cpu{background:var(--cpu);}
.pbar-fill.ssd{background:var(--ssd);}

/* NO RESULTS */
.no-res{text-align:center;padding:5rem 2rem;color:var(--text3);}
.no-res .icon{font-size:3rem;margin-bottom:1rem;opacity:0.3;}

/* DETAIL PANEL */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(4px);}
.overlay-bg.show{opacity:1;pointer-events:all;}
.detail-panel{position:fixed;top:0;right:-660px;width:640px;height:100vh;background:var(--bg2);border-left:1px solid var(--border2);z-index:400;transition:right 0.3s cubic-bezier(0.16,1,0.3,1);overflow-y:auto;display:flex;flex-direction:column;}
.detail-panel.open{right:0;}
.dp-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;top:0;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;}
.dp-header-left{display:flex;flex-direction:column;gap:4px;}
.dp-brand-badge{display:flex;gap:6px;align-items:center;}
.dp-title{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);line-height:1.1;}
.dp-sub{font-size:0.78rem;color:var(--text2);}
.dp-close{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:5px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.dp-close:hover{color:var(--white);border-color:var(--border2);}
.dp-body{flex:1;padding:0;}
.dp-section{border-bottom:1px solid var(--border);}
.dp-section-title{padding:0.7rem 1.5rem;background:var(--bg4);font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:0.45rem 1rem;border-bottom:1px solid rgba(26,34,53,0.5);border-right:1px solid rgba(26,34,53,0.5);}
.dp-row:nth-child(even){border-right:none;}
.dp-key{font-size:0.75rem;color:var(--text2);letter-spacing:0.3px;}
.dp-val{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--white);text-align:right;max-width:55%;word-break:break-word;}
.dp-val.green{color:#4ade80;}
.dp-val.yellow{color:var(--accent);}
.dp-perf-section{padding:1rem 1.5rem;}
.dp-perf-section h4{font-family:'Rajdhani',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:0.75rem;}
.dp-perf-bar{margin-bottom:0.6rem;}
.dp-perf-label{display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:4px;}
.dp-perf-track{background:var(--border);height:6px;border-radius:3px;overflow:hidden;}
.dp-perf-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}

/* Footer */
footer{border-top:1px solid var(--border);padding:1rem 1.5rem;text-align:center;font-size:0.75rem;color:var(--text3);position:relative;z-index:5;}
footer a{color:var(--accent);text-decoration:none;}

@media(max-width:1000px){
  .specs-tbl th:nth-child(n+6){display:none;}
  .specs-tbl td:nth-child(n+6){display:none;}
  .detail-panel{width:100%;right:-100%;}
}
@media(max-width:600px){
  .db-counts{display:none;}
  .brand-tabs{flex-wrap:wrap;}
  .ctrl-inner{gap:0.4rem;}
}
</style>
</head>

</div>

<div class="tbl-wrap">

  <div class="no-res" id="no-res" style="display:none;">

</div>

<!-- Overlay -->
<div class="overlay-bg" id="overlay" onclick="closeDetail()"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="dp-header">
    <div class="dp-header-left">

      <div class="dp-sub" id="dp-sub">—</div>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<footer>
  Build Database &nbsp;·&nbsp; Specifications sourced from manufacturer datasheets &nbsp;·&nbsp;
  <a href="index.html">← Back to Homepage</a>
</footer>

// STATE
// ══════════════════════════════════════════════════════
let state = {cat:'gpu', brand:'all', search:'', arch:'', sort:'', sortDir:1, sortKey:''};

function allData(){return [...GPUS,...CPUS,...SSDS];}
function catData(){
  if(state.cat==='gpu') return GPUS;
  if(state.cat==='cpu') return CPUS;
  if(state.cat==='ssd') return SSDS;
  return allData();
}
function colDefs(){
  if(state.cat==='gpu') return GPU_COLS;
  if(state.cat==='cpu') return CPU_COLS;
  if(state.cat==='ssd') return SSD_COLS;
  return GPU_COLS;
}

function getFiltered(){
  let data = catData();
  // brand
  if(state.brand !== 'all') data = data.filter(d=>d.brand===state.brand);
  // arch
  if(state.arch) data = data.filter(d=>d.arch===state.arch);
  // search
  if(state.search){
    const q = state.search.toLowerCase();
    data = data.filter(d=>JSON.stringify(Object.values(d)).toLowerCase().includes(q));
  }
  // sort
  if(state.sort==='name') data=[...data].sort((a,b)=>a.name.localeCompare(b.name));
  else if(state.sort==='year_desc') data=[...data].sort((a,b)=>b.year-a.year);
  else if(state.sort==='year_asc') data=[...data].sort((a,b)=>a.year-b.year);
  else if(state.sort==='perf_desc') data=[...data].sort((a,b)=>b.perf-a.perf);
  else if(state.sort==='tdp_asc') data=[...data].sort((a,b)=>a.tdp-b.tdp);
  if(state.sortKey){
    data=[...data].sort((a,b)=>{
      const av=a[state.sortKey], bv=b[state.sortKey];
      if(typeof av==='number') return (av-bv)*state.sortDir;
      return String(av).localeCompare(String(bv))*state.sortDir;
    });
  }
  return data;
}

function buildArchFilter(){
  const data = catData();
  const archs = [...new Set(data.map(d=>d.arch))].sort();
  const sel = document.getElementById('arch-filter');
  sel.innerHTML='<option value="">All Architectures</option>';
  archs.forEach(a=>{
    const o=document.createElement('option');
    o.value=a; o.textContent=a;
    if(a===state.arch) o.selected=true;
    sel.appendChild(o);
  });
}

function updateBrandButtons(){
  const cat = state.cat;
  const allBrands = {
    gpu:['all','NVIDIA','AMD','Intel'],
    cpu:['all','Intel','AMD'],
    ssd:['all','Samsung','WD','Seagate','Kingston','Crucial'],
    all:['all','NVIDIA','AMD','Intel','Samsung','WD','Seagate','Kingston','Crucial']
  };
  const brands = allBrands[cat]||allBrands.all;
  const container = document.getElementById('brand-tabs');
  container.innerHTML = brands.map(b=>{
    const cls = b==='all'?'all':b.toLowerCase().replace(/\s+/,'-');
    const active = state.brand===b?'active':'';
    return `<button class="brand-btn ${cls} ${active}" data-brand="${b}">${b==='all'?'All Brands':b}</button>`;
  }).join('');
  container.querySelectorAll('.brand-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.brand=btn.dataset.brand;
      state.sortKey='';
      updateBrandButtons();
      buildArchFilter();
      render();
    });
  });
}

function render(){
  const cols = colDefs();
  const data = getFiltered();

  // HEAD
  const head = document.getElementById('tbl-head');
  head.innerHTML = '<tr>'+cols.map(c=>{
    let cls='';
    if(state.sortKey===c.k) cls=state.sortDir===1?'sorted-asc':'sorted-desc';
    const arr = state.sortKey===c.k?(state.sortDir===1?'▲':'▼'):'';
    return `<th class="${cls}" data-key="${c.k}" style="${c.w?'width:'+c.w:''}">${c.l}<span class="arr">${arr}</span></th>`;
  }).join('')+'</tr>';
  head.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click',()=>{
      if(state.sortKey===th.dataset.key) state.sortDir*=-1;
      else{state.sortKey=th.dataset.key; state.sortDir=1; state.sort='';}
      document.getElementById('sort-sel').value='';
      render();
    });
  });

  // BODY
  const tbody = document.getElementById('tbl-body');
  const noRes = document.getElementById('no-res');
  if(!data.length){tbody.innerHTML='';noRes.style.display='block';document.getElementById('res-count').textContent='0 results';return;}
  noRes.style.display='none';

  tbody.innerHTML = data.map(d=>{
    return `<tr onclick='openDetail(${JSON.stringify(d)})'>
      ${cols.map(c=>`<td>${c.r?c.r(d):(d[c.k]??'—')}</td>`).join('')}
    </tr>`;
  }).join('');

  document.getElementById('res-count').textContent = `${data.length} result${data.length!==1?'s':''}`;
}

function openDetail(d){
  const cat = d.cat;
  const colors = {gpu:'#a78bfa',cpu:'#fb923c',ssd:'#34d399'};
  const color = colors[cat]||'#fff';
  const brandColor = d.brand==='NVIDIA'?'#76b900':d.brand==='AMD'?'#ed1c24':d.brand==='Intel'?'#0071c5':'#60a5fa';

  document.getElementById('dp-badges').innerHTML=
    `<span class="badge badge-${cat}">${cat.toUpperCase()}</span>
     <span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:${brandColor};font-weight:700;">${d.brand}</span>`;
  document.getElementById('dp-title').textContent = d.name;
  document.getElementById('dp-sub').textContent = `${d.arch} · ${d.year} · ${d.price||'N/A'}`;

  let html = '';

  if(cat==='gpu'){
    html += section('GPU Overview',[
      ['Brand',d.brand],['Architecture',d.arch],['GPU Die',d.gen],['Release Date',d.launch],['Launch Price',d.price],
      ['Process',d.process],['Transistors',d.transistors],['Die Size',d.die_size],['API Support',d.api],
    ]);
    html += section('Shader Processors',[
      ['CUDA / Shaders',d.shaders?.toLocaleString()],['Texture Units (TMUs)',d.tmus],['Render Outputs (ROPs)',d.rops],
      ['Tensor Cores',d.tensor_cores],['RT Cores',d.rt_cores],
    ]);
    html += section('Clock Speeds',[
      ['Base Clock',`${d.base_clk} MHz`],['Boost Clock',`${d.boost_clk} MHz`],
    ]);
    html += section('Memory',[
      ['VRAM',d.mem_size],['Memory Type',d.mem_type],['Memory Bus',`${d.mem_bus}-bit`],
      ['Memory Bandwidth',`${d.mem_bw} GB/s`],
    ]);
    html += section('Performance',[
      ['FP32 Performance',`${d.tflops_fp32} TFLOPS`],['Pixel Rate',`${d.pixel_rate} GPixel/s`],
      ['Texture Rate',`${d.tex_rate} GTexel/s`],
    ]);
    html += section('Board',[
      ['TDP',`${d.tdp}W`],['PCIe Interface',d.pcie],['Display Outputs',d.outputs],
    ]);
  } else if(cat==='cpu'){
    html += section('CPU Overview',[
      ['Brand',d.brand],['Architecture',d.arch],['Codename',d.gen],['Release Date',d.launch],
      ['Launch Price',d.price],['Process',d.process],['Socket',d.socket],
    ]);
    html += section('Core Configuration',[
      ['Total Cores',d.cores],['P-Cores',d.pcores],['E-Cores',d.ecores||'None'],['Threads',d.threads],
      ['Unlocked (OC)',d.unlock?'Yes':'No'],
    ]);
    html += section('Clock Speeds',[
      ['P-Core Base',`${d.base_p} GHz`],['P-Core Boost',`${d.boost_p} GHz`],
      ['E-Core Base',d.base_e?`${d.base_e} GHz`:'N/A'],['E-Core Boost',d.boost_e?`${d.boost_e} GHz`:'N/A'],
    ]);
    html += section('Cache',[
      ['L1 Cache',d.cache_l1],['L2 Cache',d.cache_l2],['L3 Cache',d.cache_l3],
    ]);
    html += section('Platform',[
      ['TDP (Base)',`${d.tdp}W`],['Power Limit (PBT)',`${d.pbt}W`],['Memory Support',d.imc],
      ['PCIe Lanes',d.pcie],['Integrated GPU',d.igpu],['Max Temperature',d.max_temp],
    ]);
  } else {
    html += section('SSD Overview',[
      ['Brand',d.brand],['Interface',d.arch],['Model',d.gen],['Release Date',d.launch],
      ['Launch Price',d.price],['Form Factor',d.form],['Capacity',d.capacity],
    ]);
    html += section('NAND & Controller',[
      ['NAND Flash',d.nand],['Controller',d.controller],['DRAM Cache',d.dram],
    ]);
    html += section('Sequential Performance',[
      ['Sequential Read',`${d.seq_read.toLocaleString()} MB/s`],['Sequential Write',`${d.seq_write.toLocaleString()} MB/s`],
    ]);
    html += section('Random Performance',[
      ['Random Read (4K)',`${d.rnd_read}K IOPS`],['Random Write (4K)',`${d.rnd_write}K IOPS`],
      ['Read Latency',d.latency_r],['Write Latency',d.latency_w],
    ]);
    html += section('Reliability & Security',[
      ['TBW (Endurance)',`${d.tbw} TB`],['MTBF',d.mtbf],['Encryption',d.encrypt],
    ]);
  }

  // Perf bar
  html += `<div class="dp-perf-section">
    <h4>Relative Performance Score</h4>
    <div class="dp-perf-bar">
      <div class="dp-perf-label">
        <span>${d.name}</span>
        <span style="color:${color};font-family:'JetBrains Mono',monospace;">${d.perf} / 100</span>
      </div>
      <div class="dp-perf-track">
        <div class="dp-perf-fill" style="width:${d.perf}%;background:${color};"></div>
      </div>
    </div>
  </div>`;

  document.getElementById('dp-body').innerHTML = html;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function section(title, rows){
  const pairs = rows.map(([k,v])=>`
    <div class="dp-row">
      <span class="dp-key">${k}</span>
      <span class="dp-val">${v??'N/A'}</span>
    </div>`).join('');
  return `<div class="dp-section">
    <div class="dp-section-title">${title}</div>
    <div class="dp-grid">${pairs}</div>
  </div>`;
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.getElementById('cnt-gpu').textContent = GPUS.length;
document.getElementById('cnt-cpu').textContent = CPUS.length;
document.getElementById('cnt-ssd').textContent = SSDS.length;

// Category tabs
document.querySelectorAll('.cat-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.cat-tab').forEach(b=>{b.classList.remove('active','gpu','cpu','ssd','all');});
    btn.classList.add('active',btn.dataset.cat);
    state.cat = btn.dataset.cat;
    state.brand = 'all';
    state.arch = '';
    state.sortKey = '';
    state.sort = '';
    updateBrandButtons();
    buildArchFilter();
    render();
  });
});

document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
document.getElementById('arch-filter').addEventListener('change',e=>{state.arch=e.target.value;render();});
document.getElementById('sort-sel').addEventListener('change',e=>{state.sort=e.target.value;state.sortKey='';render();});

updateBrandButtons();
buildArchFilter();
render();
</script>
</body>
</html>
